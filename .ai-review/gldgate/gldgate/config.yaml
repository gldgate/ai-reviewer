primer_types:
  overview:
    description: "A high-level architecture map for GldGate"
  implementation:
    description: "Detailed implementation behavior for a subsystem"
  caution:
    description: "Critical trust-boundary or operational caution"

global_instructions: |
  This repository is a multichain bridge-style system with IC canisters, TypeScript services, and EVM contracts.

  Review only the changed code and focus on concrete, high-impact issues.

  Priority areas:
  1. Cross-chain trust boundaries and proof verification logic.
  2. Authorization and replay protection in adapter/token-adapter flows.
  3. Correct routing and pause-state enforcement via dispatcher.
  4. Deterministic service resolution behavior (Factory + resolver TTL cache).
  5. Safety of mint/burn accounting in ICRC ledger integration.

  Reporting rules:
  1. Mention only potential issues with clear impact.
  2. If no real issue exists, explicitly say no issues were found.
  3. Include file paths and line numbers from the diff when possible.
  4. Keep findings concise, actionable, and severity-tagged.
  5. Do not review code outside the PR scope.
