global_instructions: |
  This repository implements the ai-reviewer tool itself.
  Follow these rules:
  1. Mention only real, evidence-backed issues in the changed code.
  2. A correct report with no findings is better than a noisy one.
  3. Focus on how the tool behaves for end users running reviews, dry-runs, CI checks, and provider integrations.
  4. Do not speculate about code outside the diff unless a changed call site clearly makes that behavior relevant.
  5. Prefer concrete findings about correctness, trust, review quality, cost, or operator surprise over stylistic commentary.
  6. Include file paths and line references where possible.
